name: Generate Snake with Name

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: MooCheelee
          outputs: dist/github-contribution-grid-snake.svg

      - name: Add custom name at the end
        run: |
          echo "在 SVG 中添加文字 MooCheelee"
          chmod -R u+w dist
          cp dist/github-contribution-grid-snake.svg dist/tmp.svg
          awk '
          /<\/svg>/ {
            print "<text x=\"50%\" y=\"95%\" font-size=\"40\" text-anchor=\"middle\" fill=\"red\" font-family=\"Arial\">MooCheelee</text>"
          }
          { print }
          ' dist/tmp.svg > dist/github-contribution-grid-snake.svg

      - name: Push Snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
