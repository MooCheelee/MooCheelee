name: Generate Snake with Animated Name

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 0 点生成一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: MooCheelee
          outputs: snake.svg

      - name: Add animated rainbow name
        run: |
          echo "在 SVG 中添加动态彩虹文字 MooCheelee"
          mkdir -p dist
          awk '
          /<\/svg>/ {
            print "<defs>"
            print "  <linearGradient id=\"grad1\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"0%\">"
            print "    <stop offset=\"0%\" stop-color=\"red\">"
            print "      <animate attributeName=\"stop-color\" values=\"red;orange;yellow;green;blue;purple;red\" dur=\"5s\" repeatCount=\"indefinite\" />"
            print "    </stop>"
            print "    <stop offset=\"100%\" stop-color=\"purple\">"
            print "      <animate attributeName=\"stop-color\" values=\"purple;blue;green;yellow;orange;red;purple\" dur=\"5s\" repeatCount=\"indefinite\" />"
            print "    </stop>"
            print "  </linearGradient>"
            print "</defs>"
            print "<text x=\"50%\" y=\"95%\" font-size=\"40\" font-weight=\"bold\" text-anchor=\"middle\" fill=\"url(#grad1)\" font-family=\"Arial\">MooCheelee</text>"
          }
          { print }
          ' snake.svg > dist/github-contribution-grid-snake.svg

      - name: Push Snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
